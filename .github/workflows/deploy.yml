name: Build and Deploy AllMyTube Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run build.py
        run: python3 build.py

      - name: Verify build output
        run: |
          echo "=== Generated pages ==="
          find allmytube-site -name "*.html" | sort
          echo "=== Total files: $(find allmytube-site -type f | wc -l) ==="
          echo "=== Checking affiliate link ==="
          grep -l "linkconnector" allmytube-site/index.html && echo "Affiliate link OK"

      - name: Remove old junk files from main branch
        run: |
          # Delete any old markdown/content files that aren't ours
          find . -maxdepth 1 -name "*.md" ! -name "README.md" -delete
          find . -maxdepth 1 -name "index.md" -delete 2>/dev/null || true
          find . -maxdepth 2 -name "_config.yml" -delete 2>/dev/null || true
          # Remove any old blog/ folder with old content at repo root level
          if [ -d "blog" ] && [ ! -f "allmytube-site/blog/index.html" ]; then
            echo "No old blog to clean"
          fi
          echo "Cleanup done"

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allmytube-site
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy AllMyTube site ${{ github.sha }}'
