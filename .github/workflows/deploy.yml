name: Build and Deploy AllMyTube Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run build.py
        run: python3 build.py

      - name: Verify output
        run: |
          echo "=== Generated pages ==="
          find allmytube-site -name "*.html" | sort
          echo "=== Total files: $(find allmytube-site -type f | wc -l) ==="

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./allmytube-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
